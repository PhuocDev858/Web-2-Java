# App
spring.application.name=EUREKA-SERVER

# Server port
server.port=8761

# Eureka Server config (server không cần tự đăng ký chính nó)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# (Khuyến nghị) Tắt self-preservation khi DEV để dễ thấy instance lên/xuống nhanh
# Khi deploy production thì nên bật lại (hoặc bỏ dòng này)
eureka.server.enable-self-preservation=false

# (Tuỳ chọn) Log mức vừa đủ để debug khi các service không register được
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO