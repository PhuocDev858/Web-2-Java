spring.application.name=API-GATEWAY
server.port=8900

# Eureka Client (Gateway sẽ register vào Eureka)
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# Gateway Routes (định tuyến tới các service)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=product-catalog-categories
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-CATALOG-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[2].id=product-catalog-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-CATALOG-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[5].id=recommendation-service
spring.cloud.gateway.routes[5].uri=lb://PRODUCT-RECOMMENDATION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/recommendations/**

# Logging
logging.level.org.springframework.cloud.gateway=INFO